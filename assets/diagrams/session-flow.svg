<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" height="470" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b4758"/>
    </marker>
    <marker id="arrow-sm" markerWidth="6" markerHeight="6" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L6,2.5 z" fill="#3b4758"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="470" fill="#0b0e14"/>

  <!-- ── 1. User speech bubble ── -->
  <rect x="40" y="18" width="800" height="52" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <!-- Blue left accent border -->
  <rect x="40" y="18" width="5" height="52" fill="#7aa2f7" rx="3"/>
  <text x="58" y="36" font-size="11" fill="#8b98a9">YOU</text>
  <text x="58" y="55" font-size="13" fill="#7aa2f7">"Use rUvOS to build a POST /users endpoint, and remember the design as we go."</text>

  <!-- Arrow 1 -->
  <line x1="440" y1="70" x2="440" y2="90" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 2. Routing label node ── -->
  <rect x="260" y="90" width="360" height="28" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="8"/>
  <text x="440" y="109" font-size="11.5" fill="#8b98a9" text-anchor="middle">Claude Code routes to rUvOS (you named it)</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="118" x2="440" y2="138" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 3. Tool calls block ── -->
  <rect x="40" y="138" width="800" height="202" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>

  <!-- Row 1: session.create -->
  <rect x="56" y="152" width="768" height="30" fill="#0d1117" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="72" y="173" font-size="12" fill="#5ed0c0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">→ session.create   { name: "users-endpoint" }</text>
  <text x="648" y="173" font-size="11" fill="#8b98a9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">signed .rvf created</text>

  <!-- Row 2: memory.store -->
  <rect x="56" y="188" width="768" height="30" fill="#0d1117" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="72" y="209" font-size="12" fill="#5ed0c0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">→ memory.store     { key: "spec", value: "POST /users…" }</text>
  <text x="672" y="209" font-size="11" fill="#8b98a9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">saved to namespace</text>

  <!-- Row 3: orchestrate.run label -->
  <rect x="56" y="224" width="768" height="30" fill="#0d1117" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="72" y="245" font-size="12" fill="#5ed0c0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">→ orchestrate.run  { template: "feature" }</text>
  <text x="690" y="245" font-size="11" fill="#8b98a9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">pipeline below</text>

  <!-- Pipeline chips: planner → coder → tester → reviewer -->
  <!-- planner -->
  <rect x="100" y="262" width="88" height="26" fill="#161c27" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="144" y="280" font-size="11.5" fill="#e6edf3" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">planner</text>
  <!-- arrow -->
  <line x1="188" y1="275" x2="220" y2="275" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow-sm)"/>
  <!-- coder -->
  <rect x="220" y="262" width="88" height="26" fill="#161c27" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="264" y="280" font-size="11.5" fill="#e6edf3" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">coder</text>
  <!-- arrow -->
  <line x1="308" y1="275" x2="340" y2="275" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow-sm)"/>
  <!-- tester -->
  <rect x="340" y="262" width="88" height="26" fill="#161c27" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="384" y="280" font-size="11.5" fill="#e6edf3" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">tester</text>
  <!-- arrow -->
  <line x1="428" y1="275" x2="460" y2="275" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow-sm)"/>
  <!-- reviewer -->
  <rect x="460" y="262" width="88" height="26" fill="#161c27" stroke="#1f2733" stroke-width="1" rx="6"/>
  <text x="504" y="280" font-size="11.5" fill="#e6edf3" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">reviewer</text>

  <!-- "✓ artifact" labels under chips -->
  <text x="144" y="300" font-size="10" fill="#9ece6a" text-anchor="middle">✓ artifact</text>
  <text x="264" y="300" font-size="10" fill="#9ece6a" text-anchor="middle">✓ artifact</text>
  <text x="384" y="300" font-size="10" fill="#9ece6a" text-anchor="middle">✓ artifact</text>
  <text x="504" y="300" font-size="10" fill="#9ece6a" text-anchor="middle">✓ artifact</text>

  <!-- ── 4. Dim divider [next day] ── -->
  <line x1="60" y1="354" x2="390" y2="354" stroke="#1f2733" stroke-width="1"/>
  <text x="440" y="358" font-size="11" fill="#8b98a9" text-anchor="middle">[ next day ]</text>
  <line x1="490" y1="354" x2="820" y2="354" stroke="#1f2733" stroke-width="1"/>

  <!-- Arrow 3 -->
  <line x1="440" y1="362" x2="440" y2="382" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 5. Second user bubble ── -->
  <rect x="40" y="382" width="800" height="36" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <rect x="40" y="382" width="5" height="36" fill="#7aa2f7" rx="3"/>
  <text x="58" y="396" font-size="11" fill="#8b98a9">YOU</text>
  <text x="58" y="411" font-size="13" fill="#7aa2f7">"Resume my rUvOS session for the users endpoint."</text>

  <!-- Arrow 4 -->
  <line x1="440" y1="418" x2="440" y2="432" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── 6. Resume tool calls ── -->
  <rect x="40" y="432" width="800" height="28" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="56" y="436" width="368" height="20" fill="#0d1117" stroke="#1f2733" stroke-width="1" rx="5"/>
  <text x="66" y="451" font-size="11.5" fill="#5ed0c0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">→ session.resume  { session_id: "…" }</text>
  <text x="280" y="451" font-size="10" fill="#8b98a9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"></text>

  <rect x="436" y="436" width="392" height="20" fill="#0d1117" stroke="#1f2733" stroke-width="1" rx="5"/>
  <text x="446" y="451" font-size="11.5" fill="#5ed0c0" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">→ memory.search   { query: "users endpoint design" }</text>

  <!-- Annotations below resume row -->
  <text x="240" y="470" font-size="10" fill="#9ece6a" text-anchor="middle">context restored from signed .rvf</text>
  <text x="632" y="470" font-size="10" fill="#9ece6a" text-anchor="middle">recalls the saved spec</text>
</svg>
