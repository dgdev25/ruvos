<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 240" width="880" height="240" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16202e"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#5ed0c0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#5ed0c0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="240" fill="url(#bg)"/>
  <rect width="880" height="240" fill="url(#glow)"/>

  <!-- Main card panel -->
  <rect x="24" y="20" width="832" height="200" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>

  <!-- Wordmark: r + Uv(teal) + OS -->
  <text x="64" y="108" font-size="64" font-weight="800" fill="#e6edf3" letter-spacing="-1">
    <tspan fill="#e6edf3">r</tspan><tspan fill="#5ed0c0">Uv</tspan><tspan fill="#e6edf3">OS</tspan>
  </text>

  <!-- Subtitle -->
  <text x="64" y="140" font-size="22" font-weight="400" fill="#e6edf3" letter-spacing="0.2">The Agentic Operating System</text>

  <!-- Tagline -->
  <text x="64" y="164" font-size="15" fill="#8b98a9">RuVector is the kernel  ·  rUvOS is the shell</text>

  <!-- Pill badges row -->
  <!-- Pill 1: "v4.0.0-rc.1" — approx width = 10*7+24 = 94 -->
  <rect x="64" y="183" width="94" height="26" rx="999" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="111" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#5ed0c0" text-anchor="middle">v4.0.0-rc.1</text>

  <!-- Pill 2: "24 MCP tools · 9 domains" — approx width = 24*7+24 = 192 -->
  <rect x="170" y="183" width="192" height="26" rx="999" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="266" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#5ed0c0" text-anchor="middle">24 MCP tools · 9 domains</text>

  <!-- Pill 3: "100% pure Rust" — approx width = 14*7+24 = 122 -->
  <rect x="374" y="183" width="122" height="26" rx="999" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="435" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#5ed0c0" text-anchor="middle">100% pure Rust</text>

  <!-- Pill 4: "no SQLite · no Node · no daemon" — approx width = 31*7+24 = 241 -->
  <rect x="508" y="183" width="241" height="26" rx="999" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="628.5" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#5ed0c0" text-anchor="middle">no SQLite · no Node · no daemon</text>

  <!-- Right-side decorative accent lines (subtle) -->
  <line x1="760" y1="60" x2="820" y2="60" stroke="#1f2733" stroke-width="1"/>
  <line x1="752" y1="72" x2="828" y2="72" stroke="#1f2733" stroke-width="1"/>
  <line x1="758" y1="84" x2="824" y2="84" stroke="#1f2733" stroke-width="1"/>

  <!-- Teal dot accent top-right -->
  <circle cx="816" cy="48" r="5" fill="#5ed0c0" opacity="0.7"/>
  <circle cx="800" cy="48" r="3" fill="#7aa2f7" opacity="0.5"/>
  <circle cx="788" cy="48" r="3" fill="#5ed0c0" opacity="0.3"/>
</svg>
