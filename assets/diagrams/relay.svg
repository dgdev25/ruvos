<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b4758"/>
    </marker>
    <marker id="arrow-r" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#3b4758"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0b0e14"/>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" fill="#8b98a9" font-size="11" letter-spacing="0.5">rUvOS · relay — cross-instance coordination via shared file mailboxes</text>

  <!-- ═══════════════ LEFT CARD: Instance A ═══════════════ -->
  <rect x="18" y="42" width="220" height="218" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>

  <!-- Terminal header bar -->
  <rect x="18" y="42" width="220" height="28" rx="12" fill="#0e131b"/>
  <rect x="18" y="56" width="220" height="14" fill="#0e131b"/>
  <!-- Dots -->
  <circle cx="36" cy="56" r="4" fill="#ff5f56"/>
  <circle cx="52" cy="56" r="4" fill="#ffbd2e"/>
  <circle cx="68" cy="56" r="4" fill="#27c93f"/>

  <!-- Instance label -->
  <text x="128" y="59" text-anchor="middle" fill="#5ed0c0" font-size="11" font-weight="600">Instance A · backend</text>

  <!-- Terminal body -->
  <rect x="28" y="78" width="200" height="168" rx="8" fill="#0e131b"/>

  <!-- Prompt + code lines -->
  <text x="40" y="100" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">$ relay.announce \</text>
  <text x="48" y="114" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">{summary:</text>
  <text x="108" y="114" fill="#9ece6a" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">"backend: auth"</text>
  <text x="196" y="114" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">}</text>
  <text x="40" y="130" fill="#5ed0c0" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">✓ announced</text>

  <line x1="40" y1="140" x2="218" y2="140" stroke="#1f2733" stroke-width="1"/>

  <text x="40" y="158" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">$ relay.send \</text>
  <text x="48" y="172" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">--to B \</text>
  <text x="48" y="186" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">--msg </text>
  <text x="82" y="186" fill="#9ece6a" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">"ready for review"</text>
  <text x="40" y="202" fill="#5ed0c0" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">✓ queued → B.inbox</text>

  <line x1="40" y1="212" x2="218" y2="212" stroke="#1f2733" stroke-width="1"/>
  <text x="40" y="228" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">reads inbox from B</text>
  <text x="40" y="240" fill="#7aa2f7" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">⟵ "approved"</text>

  <!-- ═══════════════ CENTER CARD: Shared Store ═══════════════ -->
  <rect x="310" y="42" width="260" height="218" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>

  <!-- Header -->
  <rect x="310" y="42" width="260" height="38" rx="12" fill="#0e131b"/>
  <rect x="310" y="64" width="260" height="16" fill="#0e131b"/>
  <text x="440" y="57" text-anchor="middle" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">$RUVOS_HOME/relays/</text>
  <text x="440" y="72" text-anchor="middle" fill="#8b98a9" font-size="10">(plain files · no daemon)</text>

  <!-- File chips -->
  <rect x="330" y="92" width="220" height="28" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="346" y="104" fill="#8b98a9" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">📄</text>
  <text x="362" y="104" fill="#5ed0c0" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">A-3f91.json</text>
  <text x="362" y="115" fill="#8b98a9" font-size="8" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">presence · summary · ts · ttl=60s</text>

  <rect x="330" y="128" width="220" height="28" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="346" y="140" fill="#8b98a9" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">📄</text>
  <text x="362" y="140" fill="#7aa2f7" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">B-7c42.json</text>
  <text x="362" y="151" fill="#8b98a9" font-size="8" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">presence · summary · ts · ttl=60s</text>

  <rect x="330" y="164" width="220" height="28" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="346" y="176" fill="#8b98a9" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">📬</text>
  <text x="362" y="176" fill="#7aa2f7" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">B-7c42.inbox/&lt;msg&gt;.json</text>
  <text x="362" y="187" fill="#9ece6a" font-size="8" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">"ready for review" ← from A</text>

  <rect x="330" y="200" width="220" height="28" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="346" y="212" fill="#8b98a9" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">📬</text>
  <text x="362" y="212" fill="#5ed0c0" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">A-3f91.inbox/&lt;msg&gt;.json</text>
  <text x="362" y="223" fill="#9ece6a" font-size="8" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">"approved" ← from B</text>

  <!-- ═══════════════ RIGHT CARD: Instance B ═══════════════ -->
  <rect x="642" y="42" width="220" height="218" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>

  <!-- Terminal header bar -->
  <rect x="642" y="42" width="220" height="28" rx="12" fill="#0e131b"/>
  <rect x="642" y="56" width="220" height="14" fill="#0e131b"/>
  <!-- Dots -->
  <circle cx="660" cy="56" r="4" fill="#ff5f56"/>
  <circle cx="676" cy="56" r="4" fill="#ffbd2e"/>
  <circle cx="692" cy="56" r="4" fill="#27c93f"/>

  <!-- Instance label -->
  <text x="752" y="59" text-anchor="middle" fill="#7aa2f7" font-size="11" font-weight="600">Instance B · frontend</text>

  <!-- Terminal body -->
  <rect x="652" y="78" width="200" height="168" rx="8" fill="#0e131b"/>

  <!-- Prompt + code lines -->
  <text x="664" y="100" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">$ relay.list \</text>
  <text x="672" y="114" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">{scope:</text>
  <text x="710" y="114" fill="#9ece6a" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">"machine"</text>
  <text x="762" y="114" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">}</text>
  <text x="664" y="130" fill="#7aa2f7" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">→ [A-3f91 live]</text>

  <line x1="664" y1="140" x2="842" y2="140" stroke="#1f2733" stroke-width="1"/>

  <text x="664" y="158" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">reads inbox</text>
  <text x="664" y="172" fill="#9ece6a" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">⟵ "ready for review"</text>

  <line x1="664" y1="182" x2="842" y2="182" stroke="#1f2733" stroke-width="1"/>

  <text x="664" y="200" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">$ relay.send \</text>
  <text x="672" y="214" fill="#8b98a9" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">--to A --msg </text>
  <text x="744" y="214" fill="#9ece6a" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">"approved"</text>
  <text x="664" y="230" fill="#7aa2f7" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">✓ queued → A.inbox</text>

  <!-- ═══════════════ ARROWS ═══════════════ -->

  <!-- A → center store (top path) -->
  <path d="M238,110 Q274,100 310,106" fill="none" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="274" y="97" text-anchor="middle" fill="#8b98a9" font-size="8.5">announce →</text>
  <text x="274" y="108" text-anchor="middle" fill="#8b98a9" font-size="8.5">writes file</text>

  <!-- A → center store (bottom path - send) -->
  <path d="M238,175 Q274,185 310,178" fill="none" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="274" y="196" text-anchor="middle" fill="#8b98a9" font-size="8.5">send →</text>
  <text x="274" y="207" text-anchor="middle" fill="#8b98a9" font-size="8.5">writes inbox</text>

  <!-- center store → B (top path) -->
  <path d="M570,110 Q606,100 642,106" fill="none" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="606" y="97" text-anchor="middle" fill="#8b98a9" font-size="8.5">list → reads</text>
  <text x="606" y="108" text-anchor="middle" fill="#8b98a9" font-size="8.5">&amp; drains</text>

  <!-- B → center store return (send back) -->
  <path d="M642,215 Q606,225 570,218" fill="none" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow-r)"/>
  <text x="606" y="237" text-anchor="middle" fill="#8b98a9" font-size="8.5">reply →</text>
  <text x="606" y="248" text-anchor="middle" fill="#8b98a9" font-size="8.5">writes A.inbox</text>

  <!-- center store → A return (A reads inbox) -->
  <path d="M310,215 Q274,225 238,218" fill="none" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow-r)"/>
  <text x="274" y="237" text-anchor="middle" fill="#8b98a9" font-size="8.5">A drains</text>
  <text x="274" y="248" text-anchor="middle" fill="#8b98a9" font-size="8.5">own inbox</text>

  <!-- ═══════════════ "NO ..." BADGES STRIP ═══════════════ -->
  <rect x="18" y="272" width="844" height="34" rx="10" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>

  <!-- Badge: no daemon -->
  <rect x="32" y="280" width="84" height="18" rx="6" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="74" y="292" text-anchor="middle" fill="#8b98a9" font-size="10">no daemon</text>

  <!-- Badge: no port -->
  <rect x="126" y="280" width="64" height="18" rx="6" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="158" y="292" text-anchor="middle" fill="#8b98a9" font-size="10">no port</text>

  <!-- Badge: no database -->
  <rect x="200" y="280" width="88" height="18" rx="6" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="244" y="292" text-anchor="middle" fill="#8b98a9" font-size="10">no database</text>

  <!-- Badge: ephemeral JSON (no .rvf) -->
  <rect x="298" y="280" width="146" height="18" rx="6" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="371" y="292" text-anchor="middle" fill="#8b98a9" font-size="10">ephemeral JSON · no .rvf</text>

  <!-- Badge: TTL liveness -->
  <rect x="454" y="280" width="240" height="18" rx="6" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <text x="574" y="292" text-anchor="middle" fill="#8b98a9" font-size="10">60s TTL liveness — stale instances pruned</text>

  <!-- ═══════════════ PROMINENT PROVENANCE BAND ═══════════════ -->
  <rect x="18" y="314" width="844" height="58" rx="12" fill="#101c16" stroke="#9ece6a" stroke-width="1.5"/>
  <!-- icon chip -->
  <rect x="30" y="326" width="34" height="34" rx="8" fill="#162a1c" stroke="#9ece6a" stroke-width="1"/>
  <text x="47" y="349" text-anchor="middle" fill="#9ece6a" font-size="18">🧾</text>
  <text x="78" y="337" fill="#9ece6a" font-size="13" font-weight="700">Durable provenance — even though the mailboxes are ephemeral</text>
  <text x="78" y="354" fill="#cfe9bf" font-size="11">Every <tspan font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#9ece6a">relay.announce</tspan> / <tspan font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#9ece6a">relay.send</tspan> is written to the <tspan font-weight="700">signed <tspan font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#9ece6a">gov.events</tspan> audit log</tspan> (redb store) —</text>
  <text x="78" y="368" fill="#cfe9bf" font-size="11">so the <tspan font-style="italic">fact that</tspan> coordination happened is permanently recorded, while the 60s mailbox files are not.</text>

  <!-- ═══════════════ BOTTOM LABEL ═══════════════ -->
  <text x="440" y="390" text-anchor="middle" fill="#3b4758" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">relay domain · ruvos-mcp · relay.announce · relay.send · relay.list</text>
</svg>
