<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#3b4758"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0b0e14"/>

  <!-- ── QUERY NODE ── -->
  <rect x="18" y="152" width="140" height="70" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="88" y="175" text-anchor="middle" font-size="11" fill="#5ed0c0" font-weight="600">query</text>
  <text x="88" y="193" text-anchor="middle" font-size="9.5" fill="#e6edf3" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">query</text>
  <text x="88" y="208" text-anchor="middle" font-size="9" fill="#8b98a9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">+ filter_tags?</text>

  <!-- arrow query → tier1 -->
  <line x1="158" y1="172" x2="204" y2="142" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- arrow query → tier2 -->
  <line x1="158" y1="208" x2="204" y2="262" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── TIER 1 CARD ── -->
  <rect x="208" y="36" width="240" height="210" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <!-- header bar -->
  <rect x="208" y="36" width="240" height="32" fill="#0d3d38" rx="12"/>
  <rect x="208" y="52" width="240" height="16" fill="#0d3d38"/>
  <text x="328" y="57" text-anchor="middle" font-size="11" fill="#5ed0c0" font-weight="700">Tier 1 · ANN vector search</text>

  <!-- sub-chip: HNSW normal -->
  <rect x="222" y="80" width="212" height="44" fill="#0b1a18" stroke="#1f3d38" stroke-width="1" rx="8"/>
  <text x="232" y="97" font-size="10" fill="#5ed0c0" font-weight="600">HNSW</text>
  <text x="290" y="97" font-size="10" fill="#8b98a9">(ruvector-core)</text>
  <text x="232" y="113" font-size="9" fill="#8b98a9">normal search · default path</text>

  <!-- sub-chip: ACORN -->
  <rect x="222" y="132" width="212" height="58" fill="#0b1a18" stroke="#1f3d38" stroke-width="1" rx="8"/>
  <text x="232" y="150" font-size="10" fill="#5ed0c0" font-weight="600">ACORN filtered HNSW</text>
  <text x="232" y="164" font-size="9" fill="#8b98a9">(ruvector-acorn) · when filter_tags set</text>
  <text x="232" y="178" font-size="8.5" fill="#8b98a9" font-style="italic">predicate-agnostic → high recall</text>
  <text x="232" y="189" font-size="8.5" fill="#8b98a9" font-style="italic">at low selectivity</text>

  <!-- sub-chip: RaBitQ -->
  <rect x="222" y="198" width="212" height="30" fill="#0b1a18" stroke="#1f3d38" stroke-width="1" rx="8"/>
  <text x="232" y="213" font-size="10" fill="#5ed0c0" font-weight="600">RaBitQ 1-bit</text>
  <text x="302" y="213" font-size="9.5" fill="#8b98a9">(ruvector-rabitq)</text>
  <text x="232" y="225" font-size="8.5" fill="#8b98a9">scalar quantisation · memory efficient</text>

  <!-- arrow tier1 → merge -->
  <line x1="448" y1="140" x2="494" y2="190" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── TIER 2 CARD ── -->
  <rect x="208" y="254" width="240" height="90" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <!-- header bar -->
  <rect x="208" y="254" width="240" height="30" fill="#0d1f40" rx="12"/>
  <rect x="208" y="270" width="240" height="14" fill="#0d1f40"/>
  <text x="328" y="274" text-anchor="middle" font-size="11" fill="#7aa2f7" font-weight="700">Tier 2 · RuLake</text>
  <text x="328" y="296" text-anchor="middle" font-size="10" fill="#8b98a9">federated / cached candidates</text>
  <text x="328" y="312" text-anchor="middle" font-size="9" fill="#8b98a9">long-term + cross-session store</text>
  <text x="328" y="328" text-anchor="middle" font-size="9" fill="#8b98a9">partitioned by namespace + tag</text>

  <!-- arrow tier2 → merge -->
  <line x1="448" y1="285" x2="494" y2="230" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── MERGE NODE ── -->
  <rect x="498" y="178" width="148" height="60" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="572" y="201" text-anchor="middle" font-size="10.5" fill="#e6edf3" font-weight="600">union by key</text>
  <text x="572" y="216" text-anchor="middle" font-size="10" fill="#8b98a9">max score wins</text>
  <text x="572" y="230" text-anchor="middle" font-size="8.5" fill="#8b98a9">dedup + combine tiers</text>

  <!-- arrow merge → rank -->
  <line x1="646" y1="208" x2="684" y2="208" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── RANK CARD ── -->
  <rect x="688" y="142" width="178" height="130" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <!-- header bar -->
  <rect x="688" y="142" width="178" height="30" fill="#1e1040" rx="12"/>
  <rect x="688" y="157" width="178" height="15" fill="#1e1040"/>
  <text x="777" y="162" text-anchor="middle" font-size="10.5" fill="#bb9af7" font-weight="700">MMR diversity + recency</text>
  <text x="777" y="186" text-anchor="middle" font-size="9" fill="#8b98a9">0.85 · relevance</text>
  <text x="777" y="200" text-anchor="middle" font-size="9" fill="#8b98a9">+ 0.15 · recency</text>
  <text x="777" y="215" text-anchor="middle" font-size="9" fill="#8b98a9">then MMR re-rank</text>
  <text x="777" y="229" text-anchor="middle" font-size="9" fill="#8b98a9">for result diversity</text>
  <text x="777" y="244" text-anchor="middle" font-size="8.5" fill="#8b98a9" font-style="italic">λ tunable per call</text>
  <text x="777" y="258" text-anchor="middle" font-size="8.5" fill="#8b98a9" font-style="italic">→ select top-k</text>

  <!-- arrow rank → results -->
  <line x1="777" y1="272" x2="777" y2="314" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── RESULTS NODE ── -->
  <rect x="694" y="318" width="166" height="54" fill="#0d2216" stroke="#1a4030" stroke-width="1" rx="12"/>
  <text x="777" y="341" text-anchor="middle" font-size="11" fill="#9ece6a" font-weight="700">top-k results</text>
  <text x="777" y="357" text-anchor="middle" font-size="9" fill="#8b98a9">scored · diverse · fresh</text>
  <text x="777" y="369" text-anchor="middle" font-size="8.5" fill="#8b98a9">returned to caller</text>

  <!-- ── KNOWLEDGE GRAPH CARD ── -->
  <rect x="490" y="318" width="182" height="66" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <!-- header bar -->
  <rect x="490" y="318" width="182" height="26" fill="#1a1a28" rx="12"/>
  <rect x="490" y="330" width="182" height="14" fill="#1a1a28"/>
  <text x="581" y="335" text-anchor="middle" font-size="9.5" fill="#7aa2f7" font-weight="700">temporal knowledge graph</text>
  <text x="581" y="348" text-anchor="middle" font-size="8.5" fill="#8b98a9">ruvos-memory-graph</text>
  <text x="581" y="362" text-anchor="middle" font-size="8.5" fill="#8b98a9">entity + relation edges</text>
  <text x="581" y="374" text-anchor="middle" font-size="8.5" fill="#8b98a9">timestamped provenance</text>

  <!-- arrow kg → results (labeled) -->
  <line x1="672" y1="351" x2="694" y2="351" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="683" y="344" text-anchor="middle" font-size="8" fill="#8b98a9">related_entities</text>
  <text x="683" y="354" text-anchor="middle" font-size="8" fill="#8b98a9">(additive)</text>

  <!-- ── LABELS on fan-out arrows ── -->
  <text x="172" y="148" font-size="8.5" fill="#8b98a9">ANN</text>
  <text x="168" y="230" font-size="8.5" fill="#8b98a9">lake</text>
</svg>
