<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880" height="560" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b4758"/>
    </marker>
    <!-- Dashed pattern for available chips -->
    <pattern id="dashBorder" patternUnits="userSpaceOnUse" width="8" height="1">
      <line x1="0" y1="0.5" x2="5" y2="0.5" stroke="#8b98a9" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="#0b0e14"/>

  <!-- ═══════════════════════════════════════════════════════════════
       A. rUvOS orchestration shell container
  ════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="16" width="840" height="194" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="40" y="42" font-size="13" font-weight="600" fill="#7aa2f7">rUvOS  —  orchestration shell  ·  6 crates</text>

  <!-- Row 1: 3 crate cards -->
  <!-- ruvos-cli -->
  <rect x="36" y="54" width="245" height="64" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="56" y="75" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-cli</text>
  <text x="56" y="96" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">clap CLI</text>

  <!-- ruvos-mcp -->
  <rect x="301" y="54" width="245" height="64" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="321" y="75" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-mcp</text>
  <text x="321" y="96" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">MCP server + 24 tools</text>

  <!-- ruvos-host -->
  <rect x="566" y="54" width="274" height="64" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="586" y="75" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-host</text>
  <text x="586" y="96" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">Claude / Codex adapters</text>

  <!-- Row 2: 3 crate cards -->
  <!-- ruvos-plugin-host -->
  <rect x="36" y="134" width="245" height="64" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="56" y="155" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-plugin-host</text>
  <text x="56" y="176" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">plugins + shell exec</text>

  <!-- ruvos-hooks -->
  <rect x="301" y="134" width="245" height="64" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="321" y="155" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-hooks</text>
  <text x="321" y="176" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">hooks + SONA learning</text>

  <!-- ruvos-session -->
  <rect x="566" y="134" width="274" height="64" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="586" y="155" font-size="11.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-session</text>
  <text x="586" y="176" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">.rvf + fork + verify</text>

  <!-- ═══════════════════════════════════════════════════════════════
       B. "runs on" arrow
  ════════════════════════════════════════════════════════════════ -->
  <line x1="440" y1="212" x2="440" y2="240" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="453" y="231" font-size="11" fill="#8b98a9">runs on</text>

  <!-- ═══════════════════════════════════════════════════════════════
       C. RuVector substrate container
  ════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="246" width="840" height="280" fill="#11161f" stroke="#1f2733" stroke-width="1" rx="12"/>
  <text x="40" y="272" font-size="13" font-weight="600" fill="#5ed0c0">RuVector  —  kernel + substrate  ·  100% pure Rust</text>

  <!-- ── Group: vector search ── -->
  <text x="40" y="296" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">vector search</text>
  <!-- ruvector-core (active) -->
  <rect x="40" y="302" width="140" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="40" y="302" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="52" y="321" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvector-core</text>
  <!-- ruvector-rabitq (active) -->
  <rect x="190" y="302" width="150" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="190" y="302" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="202" y="321" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvector-rabitq</text>
  <!-- ruvector-acorn (active) -->
  <rect x="350" y="302" width="150" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="350" y="302" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="362" y="321" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvector-acorn</text>

  <!-- ── Group: learning ── -->
  <text x="520" y="296" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">learning</text>
  <!-- sona (active) -->
  <rect x="520" y="302" width="80" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="520" y="302" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="532" y="321" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">sona</text>

  <!-- ── Group: knowledge graph ── -->
  <text x="615" y="296" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">knowledge graph</text>
  <!-- ruvos-memory-graph (active) -->
  <rect x="615" y="302" width="175" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="615" y="302" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="627" y="321" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-memory-graph</text>

  <!-- ── Group: state &amp; provenance ── -->
  <text x="40" y="354" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">state &amp; provenance</text>
  <!-- ruvos-store (active) -->
  <rect x="40" y="360" width="120" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="40" y="360" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="52" y="379" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-store</text>
  <!-- rvf-crypto (active) -->
  <rect x="170" y="360" width="100" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="170" y="360" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="182" y="379" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">rvf-crypto</text>

  <!-- ── Group: safety ── -->
  <text x="285" y="354" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">safety</text>
  <!-- ruvos-safety (active) -->
  <rect x="285" y="360" width="115" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="285" y="360" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="297" y="379" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruvos-safety</text>

  <!-- ── Group: federation &amp; transport ── -->
  <text x="415" y="354" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">federation &amp; transport</text>
  <!-- rulake (active) -->
  <rect x="415" y="360" width="85" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="415" y="360" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="427" y="379" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">rulake</text>
  <!-- rvf-federation (available, dashed) -->
  <rect x="510" y="360" width="120" height="28" fill="#0e131b" stroke="#8b98a9" stroke-width="1" stroke-dasharray="4 3" rx="8"/>
  <text x="522" y="379" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">rvf-federation</text>
  <!-- ruv-swarm-transport (active) -->
  <rect x="640" y="360" width="175" height="28" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <rect x="640" y="360" width="3" height="28" fill="#5ed0c0" rx="1"/>
  <text x="652" y="379" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">ruv-swarm-transport</text>

  <!-- ── Group: distributed ── -->
  <text x="40" y="412" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">distributed</text>
  <!-- ruvector-raft (available, dashed) -->
  <rect x="40" y="418" width="125" height="28" fill="#0e131b" stroke="#8b98a9" stroke-width="1" stroke-dasharray="4 3" rx="8"/>
  <text x="52" y="437" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">ruvector-raft</text>
  <!-- ruvector-replication (available, dashed) -->
  <rect x="175" y="418" width="170" height="28" fill="#0e131b" stroke="#8b98a9" stroke-width="1" stroke-dasharray="4 3" rx="8"/>
  <text x="187" y="437" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">ruvector-replication</text>
  <!-- ruvector-cluster (available, dashed) -->
  <rect x="355" y="418" width="155" height="28" fill="#0e131b" stroke="#8b98a9" stroke-width="1" stroke-dasharray="4 3" rx="8"/>
  <text x="367" y="437" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">ruvector-cluster</text>
  <!-- ruvector-router-core (available, dashed) -->
  <rect x="520" y="418" width="175" height="28" fill="#0e131b" stroke="#8b98a9" stroke-width="1" stroke-dasharray="4 3" rx="8"/>
  <text x="532" y="437" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">ruvector-router-core</text>

  <!-- ── Legend ── -->
  <rect x="40" y="466" width="340" height="46" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="8"/>
  <!-- Active swatch -->
  <rect x="56" y="480" width="14" height="14" fill="#0e131b" stroke="#1f2733" stroke-width="1" rx="3"/>
  <rect x="56" y="480" width="3" height="14" fill="#5ed0c0" rx="1"/>
  <text x="76" y="491" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">● active in tools</text>
  <!-- Available swatch -->
  <rect x="192" y="480" width="14" height="14" fill="#0e131b" stroke="#8b98a9" stroke-width="1" stroke-dasharray="4 3" rx="3"/>
  <text x="212" y="491" font-size="10.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">○ built &amp; available</text>

  <!-- HNSW label on ruvector-core chip -->
  <text x="142" y="321" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0" opacity="0.7"> HNSW</text>
  <!-- 1-bit label on ruvector-rabitq -->
  <text x="297" y="321" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0" opacity="0.7"> 1-bit</text>
  <!-- redb label on ruvos-store -->
  <text x="116" y="379" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0" opacity="0.7"> redb</text>
  <!-- witness label on rvf-crypto -->
  <text x="233" y="379" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0" opacity="0.7"> witness</text>
</svg>
