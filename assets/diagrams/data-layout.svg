<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 430" width="880" height="430" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="880" height="430" fill="#0b0e14"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13.5" fill="#5ed0c0">$RUVOS_HOME/   (default ./.ruvos — disk is the source of truth)</text>

  <!-- LEFT primary card: redb live store -->
  <rect x="24" y="56" width="388" height="130" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <!-- card header bar -->
  <rect x="24" y="56" width="388" height="40" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <rect x="24" y="80" width="388" height="16" fill="#11161f"/>
  <text x="44" y="83" font-size="13" font-weight="600" fill="#5ed0c0">redb live store</text>
  <text x="44" y="97" font-size="11.5" fill="#8b98a9">fast &amp; queryable</text>

  <!-- store.redb chip -->
  <rect x="44" y="108" width="112" height="30" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="100" y="128" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#e6edf3">store.redb</text>

  <!-- caption -->
  <text x="44" y="160" font-size="11.5" fill="#8b98a9">agents · tasks · events · messages · metrics</text>

  <!-- RIGHT primary card: .rvf signed snapshots -->
  <rect x="468" y="56" width="388" height="130" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <rect x="468" y="56" width="388" height="40" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <rect x="468" y="80" width="388" height="16" fill="#11161f"/>
  <text x="488" y="83" font-size="13" font-weight="600" fill="#7aa2f7">.rvf signed snapshots</text>
  <text x="488" y="97" font-size="11.5" fill="#8b98a9">tamper-evident provenance</text>

  <!-- rvf chip -->
  <rect x="488" y="108" width="136" height="30" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="556" y="128" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" fill="#e6edf3">rvf/&lt;id&gt;.rvf</text>

  <!-- caption -->
  <text x="488" y="160" font-size="11.5" fill="#8b98a9">witness-chained session containers (SHAKE-256 + HMAC)</text>

  <!-- Full-width JSON state files card -->
  <rect x="24" y="202" width="832" height="192" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <!-- header area -->
  <rect x="24" y="202" width="832" height="36" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <rect x="24" y="226" width="832" height="12" fill="#11161f"/>
  <text x="44" y="224" font-size="12.5" font-weight="600" fill="#8b98a9">JSON state files</text>

  <!-- Row 1 of chips: memory.json, memory-graph.json, intel.json -->

  <!-- memory.json chip -->
  <rect x="38" y="246" width="190" height="50" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="133" y="265" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" fill="#e6edf3">memory.json</text>
  <text x="133" y="282" text-anchor="middle" font-size="10.5" fill="#8b98a9">memory entries (namespace → key → entry)</text>

  <!-- memory-graph.json chip -->
  <rect x="244" y="246" width="192" height="50" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="340" y="265" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" fill="#e6edf3">memory-graph.json</text>
  <text x="340" y="282" text-anchor="middle" font-size="10.5" fill="#8b98a9">temporal knowledge graph</text>

  <!-- intel.json chip -->
  <rect x="452" y="246" width="182" height="50" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="543" y="265" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" fill="#e6edf3">intel.json</text>
  <text x="543" y="282" text-anchor="middle" font-size="10.5" fill="#8b98a9">SONA trajectory patterns</text>

  <!-- safety/safety.json chip -->
  <rect x="650" y="246" width="196" height="50" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="748" y="265" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" fill="#e6edf3">safety/safety.json</text>
  <text x="748" y="282" text-anchor="middle" font-size="10.5" fill="#8b98a9">constraints + violation log</text>

  <!-- Row 2 of chips: agents/<id>/output.md, .rvf-key -->

  <!-- agents/<id>/output.md chip -->
  <rect x="38" y="311" width="236" height="50" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="156" y="330" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" fill="#e6edf3">agents/&lt;id&gt;/output.md</text>
  <text x="156" y="347" text-anchor="middle" font-size="10.5" fill="#8b98a9">real agent work artifacts</text>

  <!-- .rvf-key chip -->
  <rect x="290" y="311" width="278" height="50" rx="8" fill="#0e131b" stroke="#1f2733" stroke-width="1"/>
  <text x="429" y="330" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" fill="#e6edf3">.rvf-key</text>
  <text x="429" y="347" text-anchor="middle" font-size="10.5" fill="#8b98a9">per-install signing key (0600, gitignored)</text>

  <!-- Footer -->
  <text x="440" y="414" text-anchor="middle" font-size="11.5" fill="#8b98a9" font-style="italic">No SQLite, no bundled C — the binary stays pure Rust.</text>
</svg>
