<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 210" width="880" height="210" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b4758"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="210" fill="#0b0e14"/>

  <!-- Title -->
  <text x="440" y="26" text-anchor="middle" font-size="13" fill="#8b98a9">Up and running in&#160;<tspan fill="#5ed0c0">4 steps</tspan></text>

  <!-- Connectors -->
  <line x1="196" y1="118" x2="222" y2="118" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="412" y1="118" x2="438" y2="118" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="628" y1="118" x2="654" y2="118" stroke="#3b4758" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Card 1: Clone & run -->
  <rect x="20" y="44" width="176" height="148" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <!-- Circle number -->
  <circle cx="108" cy="78" r="14" fill="none" stroke="#5ed0c0" stroke-width="1.5"/>
  <text x="108" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#5ed0c0">1</text>
  <!-- Title -->
  <text x="108" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Clone &amp; run</text>
  <!-- Command -->
  <text x="108" y="128" text-anchor="middle" font-size="9.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">git clone … &amp;&amp;</text>
  <text x="108" y="143" text-anchor="middle" font-size="9.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">./setup.sh</text>

  <!-- Card 2: Restart Claude Code -->
  <rect x="236" y="44" width="176" height="148" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <circle cx="324" cy="78" r="14" fill="none" stroke="#5ed0c0" stroke-width="1.5"/>
  <text x="324" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#5ed0c0">2</text>
  <text x="324" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Restart</text>
  <text x="324" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Claude Code</text>
  <text x="324" y="143" text-anchor="middle" font-size="10.5" fill="#8b98a9">loads MCP servers</text>
  <text x="324" y="158" text-anchor="middle" font-size="10.5" fill="#8b98a9">at startup</text>

  <!-- Card 3: Verify -->
  <rect x="452" y="44" width="176" height="148" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <circle cx="540" cy="78" r="14" fill="none" stroke="#5ed0c0" stroke-width="1.5"/>
  <text x="540" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#5ed0c0">3</text>
  <text x="540" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Verify</text>
  <text x="540" y="128" text-anchor="middle" font-size="9.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#5ed0c0">claude mcp list</text>
  <text x="540" y="148" text-anchor="middle" font-size="9.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#8b98a9">→ ruvos</text>
  <text x="540" y="163" text-anchor="middle" font-size="9.5" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" fill="#9ece6a">✓ Connected</text>

  <!-- Card 4: Just talk -->
  <rect x="668" y="44" width="192" height="148" rx="12" fill="#11161f" stroke="#1f2733" stroke-width="1"/>
  <circle cx="764" cy="78" r="14" fill="none" stroke="#5ed0c0" stroke-width="1.5"/>
  <text x="764" y="83" text-anchor="middle" font-size="13" font-weight="bold" fill="#5ed0c0">4</text>
  <text x="764" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Just talk</text>
  <text x="764" y="132" text-anchor="middle" font-size="10.5" fill="#8b98a9">all 24 tools available</text>
  <text x="764" y="148" text-anchor="middle" font-size="10.5" fill="#8b98a9">in every project</text>
</svg>
