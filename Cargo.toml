[workspace]
resolver = "2"
# Phase 0: Substrate crates copied but not yet integrated into workspace.
# The 62 curated RuVector crates are copied to substrate/ for future integration.
# See docs/spec/ruvector-curation.md for the complete audit.
members = [
    "crates/ruflo-cli",
    "crates/ruflo-mcp",
    "crates/ruflo-host",
    "crates/ruflo-plugin-host",
    "crates/ruflo-hooks",
    "crates/ruflo-session",
]
default-members = [
    "crates/ruflo-cli",
    "crates/ruflo-mcp",
    "crates/ruflo-host",
    "crates/ruflo-plugin-host",
    "crates/ruflo-hooks",
    "crates/ruflo-session",
]

[workspace.package]
version = "4.0.0-rc.1"
edition = "2021"
rust-version = "1.77"
license = "MIT"
authors = ["rUvOS contributors"]
repository = "https://github.com/dgdev25/ruvos"

[workspace.lints.rust]
unsafe_code = "forbid"
