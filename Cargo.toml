[workspace]
resolver = "2"
# Phase 1: Complete integrated workspace with all 6 Ruflo + 29 RuVector substrate crates.
members = [
    "crates/ruflo-cli",
    "crates/ruflo-mcp",
    "crates/ruflo-host",
    "crates/ruflo-plugin-host",
    "crates/ruflo-hooks",
    "crates/ruflo-session",
    "substrate/mcp-brain",
    "substrate/ruvector-acorn",
    "substrate/ruvector-cluster",
    "substrate/ruvector-core",
    "substrate/ruvector-math",
    "substrate/ruvector-rabitq",
    "substrate/ruvector-raft",
    "substrate/ruvector-replication",
    "substrate/ruvllm",
    "substrate/rvf-cli",
    "substrate/rvf-crypto",
    "substrate/rvf-ebpf",
    "substrate/rvf-federation",
    "substrate/rvf-import",
    "substrate/rvf-index",
    "substrate/rvf-kernel",
    "substrate/rvf-launch",
    "substrate/rvf-manifest",
    "substrate/rvf-node",
    "substrate/rvf-quant",
    "substrate/rvf-runtime",
    "substrate/rvf-server",
    "substrate/rvf-types",
    "substrate/rvf-wire",
    "substrate/sona",
]
default-members = [
    "crates/ruflo-cli",
    "crates/ruflo-mcp",
    "crates/ruflo-host",
    "crates/ruflo-plugin-host",
    "crates/ruflo-hooks",
    "crates/ruflo-session",
]

[workspace.package]
version = "4.0.0-rc.1"
edition = "2021"
rust-version = "1.77"
license = "MIT"
authors = ["rUvOS contributors"]
repository = "https://github.com/dgdev25/ruvos"

[workspace.dependencies]
anyhow = "1.0"
bincode = "1.3"
chrono = { version = "0.4", features = ["serde"] }
criterion = { version = "0.5", features = ["html_reports"] }
crossbeam = "0.8"
dashmap = "5.5"
futures = "0.3"
futures-core = "0.3"
hnsw_rs = "0.3.4"
memmap2 = "0.9"
mockall = "0.12"
ndarray = { version = "0.15", features = ["serde"] }
once_cell = "1.19"
parking_lot = "0.12"
proptest = "1.4"
rand = { version = "0.8", features = ["std", "std_rng"] }
rand_core = "0.6"
rand_distr = { version = "0.4", default-features = false }
rayon = "1.10"
redb = "2.0"
rkyv = { version = "0.7", features = ["validation"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
simsimd = "4.3"
thiserror = "2.0"
tokio = { version = "1.41", features = ["full"] }
tokio-stream = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.10", features = ["v4", "serde"] }

[workspace.lints.rust]
unsafe_code = "forbid"
